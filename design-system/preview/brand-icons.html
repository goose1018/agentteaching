<!doctype html><html lang="zh"><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"><title>Iconography</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.ic{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px;border:1px solid #eadfce;border-radius:14px;background:#fff}
.ic svg{stroke:#12352d;width:22px;height:22px}
.ic span{font-size:11px;color:#5d6964;font-weight:600}
</style></head>
<body><div class="card" style="background:#fbfaf7">
<div class="grid">
<div class="ic"><i data-lucide="camera"></i><span>拍题</span></div>
<div class="ic"><i data-lucide="image"></i><span>相册</span></div>
<div class="ic"><i data-lucide="lightbulb"></i><span>提示</span></div>
<div class="ic"><i data-lucide="book-open"></i><span>解析</span></div>
<div class="ic"><i data-lucide="pencil"></i><span>试试</span></div>
<div class="ic"><i data-lucide="settings"></i><span>设置</span></div>
<div class="ic"><i data-lucide="message-square-text"></i><span>会话</span></div>
<div class="ic"><i data-lucide="graduation-cap"></i><span>老师</span></div>
<div class="ic"><i data-lucide="backpack"></i><span>学生</span></div>
<div class="ic"><i data-lucide="mail"></i><span>家长摘要</span></div>
<div class="ic"><i data-lucide="mic"></i><span>录制</span></div>
<div class="ic"><i data-lucide="check-circle-2"></i><span>通过</span></div>
<div class="ic"><i data-lucide="pencil-line"></i><span>修改</span></div>
<div class="ic"><i data-lucide="flag"></i><span>反例</span></div>
</div>
<div class="ppath-meta">Lucide · 1.5 px stroke · 永远线性 · 不使用 emoji 不使用填充</div>
<script>lucide.createIcons();</script>
</div></body></html>
