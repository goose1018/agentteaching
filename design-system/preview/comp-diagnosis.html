<!doctype html><html lang="zh"><head><meta charset="utf-8">
<link rel="stylesheet" href="preview.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
<title>Diagnosis</title>
<style>
.d{padding:24px 26px;background:#fff;border:1px solid #eadfce;border-radius:24px;display:flex;flex-direction:column;gap:14px;box-shadow:0 8px 28px rgba(48,38,22,.06);font-family:'Inter','Noto Sans SC',sans-serif}
.eyebrow{font-size:11px;font-weight:800;color:#c2611f;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.eyebrow .dot{width:6px;height:6px;border-radius:50%;background:#c2611f;box-shadow:0 0 0 4px rgba(194,97,31,.18)}
.h{font-size:22px;font-weight:800;color:#10201b;letter-spacing:-0.025em}
.meta{display:flex;gap:8px;flex-wrap:wrap}
.meta span{font-size:12px;font-weight:600;background:#fdf3e6;color:#a85219;padding:5px 10px;border-radius:999px}
.section-label{font-size:13px;font-weight:700;color:#10201b;margin-top:4px;letter-spacing:-0.005em}
.stuck{display:flex;flex-direction:column;gap:10px;margin-top:2px}
.stuck-item{display:flex;align-items:flex-start;gap:12px}
.num{
  flex-shrink:0;
  width:26px;height:26px;border-radius:50%;
  background:#fdf3e6;
  border:1.5px solid #c2611f;
  color:#a85219;
  font-weight:800;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;
  line-height:1;
}
.stuck-text{font-size:14px;color:#10201b;line-height:1.55;font-weight:500;padding-top:3px}
</style></head>
<body><div class="card" style="background:#fbfaf7">
<div class="d">
  <div class="eyebrow"><span class="dot"></span>诊断结果</div>
  <div class="h">动量守恒 · 碰撞后共同速度</div>
  <div class="meta"><span>高中物理</span><span>难度 中等</span><span>识别置信度 92%</span></div>
  <div class="section-label">这道题的常见卡点</div>
  <div class="stuck">
    <div class="stuck-item"><div class="num">1</div><div class="stuck-text">没有先选研究对象</div></div>
    <div class="stuck-item"><div class="num">2</div><div class="stuck-text">把某个力直接当成合外力</div></div>
    <div class="stuck-item"><div class="num">3</div><div class="stuck-text">不知道什么时候列动量守恒方程</div></div>
  </div>
</div>
</div></body></html>
