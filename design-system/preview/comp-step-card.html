<!doctype html><html lang="zh"><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"><title>Step card</title>
<style>
.step{padding:24px;background:#fff;border:1px solid #eadfce;border-radius:24px;box-shadow:0 8px 28px rgba(48,38,22,.06);display:flex;flex-direction:column;gap:14px}
.eyebrow{font-size:12px;font-weight:800;color:#c2611f;letter-spacing:.06em;text-transform:uppercase}
.h{font-family:'Noto Serif SC',serif;font-size:30px;font-weight:800;color:#10201b;letter-spacing:-.04em}
.q{font-size:15px;line-height:1.65;color:#5d6964}
.choices{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.choices button{border:1px solid #eadfce;background:#fdf3e6;border-radius:14px;padding:12px;font:inherit;font-weight:800;font-size:13px;color:#10201b;cursor:pointer;font-family:var(--ppath-font-sans)}
.act{display:flex;flex-wrap:wrap;gap:8px}
.act button{border:0;background:#e7f0ea;color:#12352d;padding:9px 13px;border-radius:999px;font:inherit;font-weight:800;font-size:13px;font-family:var(--ppath-font-sans)}
</style></head>
<body><div class="card" style="background:#fbfaf7">
<div class="step">
  <div class="eyebrow">当前步骤 1 / 5 · 该你了</div>
  <div class="h">圈定系统</div>
  <div class="q">这道题先别急着套公式。你觉得这一步，研究系统应该选谁？</div>
  <div class="choices"><button>物体 A</button><button>物体 B</button><button>整体系统</button><button>我不确定</button></div>
  <div class="act"><button>提示一下</button><button>继续下一步</button><button>看完整解析</button><button>我来试试</button></div>
</div>
</div></body></html>
