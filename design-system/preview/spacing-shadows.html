<!doctype html><html lang="zh"><head><meta charset="utf-8"><link rel="stylesheet" href="preview.css"><title>Shadows</title>
<style>
.shadowbox{flex:1;min-height:88px;background:#fff;border:1px solid #eadfce;border-radius:18px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
.shadowbox b{font-size:13px;font-weight:800;color:#10201b}
.shadowbox span{font-family:var(--ppath-font-mono);font-size:10px;color:#5d6964;margin-top:2px}
</style></head>
<body><div class="card" style="background:#fbfaf7">
<div class="row" style="gap:14px">
<div class="shadowbox" style="box-shadow:0 2px 6px rgba(48,38,22,.04)"><b>sm</b><span>card on paper</span></div>
<div class="shadowbox" style="box-shadow:0 8px 28px rgba(48,38,22,.06)"><b>md</b><span>hover lift</span></div>
<div class="shadowbox" style="box-shadow:0 18px 55px rgba(48,38,22,.08)"><b>lg</b><span>welcome card</span></div>
<div class="shadowbox" style="box-shadow:0 30px 90px rgba(66,48,20,.12)"><b>xl</b><span>hero stack</span></div>
</div>
<div class="ppath-meta">阴影统一为暖色 (rgba(48,38,22)) — 永远不用冷蓝灰</div>
</div></body></html>
